    header {

      align-items: center;

      background: #0a0a0a;

    .back {

      text-decoration: none;

    .download {

      color: #0a0a0a;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .download:hover { opacity: 0.85; }
    .viewer {
      flex: 1;
      width: 100%;
      border: none;
      background: #1a1a1a;
      min-height: 80vh;
    }
    .mobile-fallback { display: none; padding: 3rem 1.5rem; text-align: center; }
    .mobile-fallback h2 { margin-bottom: 0.5rem; }
    .mobile-fallback p { opacity: 0.7; margin-bottom: 1.5rem; }
    @media (max-width: 768px) {
      .viewer { display: none; }
      .mobile-fallback { display: block; }

  <header>
